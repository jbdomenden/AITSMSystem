<!doctype html>
<html>
<head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Knowledge Base | AITSM</title><link rel='stylesheet' href='/shared/css/styles.css'><link rel='stylesheet' href='/modules/common/css/table-skeleton.css'></head>
<body>
<div class='app-layout'>
  <aside id='adminSidebar' class='sidebar'></aside>
  <main class='content'>
    <section id='utilityHeader' class='utility-bar card'></section>

    <div class='topbar'>
      <div>
        <h1 class='page-title'>Knowledge Base</h1>
        <p class='page-subtitle'>Browse article titles, open the full article in a modal, and manage the content lifecycle in one place.</p>
      </div>
    </div>

    <section class='card'>
      <div class='form-grid'>
        <div class='form-group'>
          <label>Search articles</label>
          <input id='search' placeholder='Search knowledge articles...' oninput='loadKnowledge()'>
        </div>
        <div class='form-group'>
          <label>Category filter</label>
          <select id='knowledgeCategory' onchange='loadKnowledge()'>
            <option value=''>All Categories</option>
            <option>Hardware</option>
            <option>Software</option>
            <option>Network</option>
            <option>Security</option>
            <option>Database</option>
            <option>General</option>
          </select>
        </div>
      </div>
    </section>

    <section class='card' style='margin-top:16px'>
      <div class='card-head'>
        <div>
          <h3 class='section-title'>Article Library</h3>
          <p class='section-subtitle'>Click any title to open the full knowledge article.</p>
        </div>
      </div>
      <div class='table-wrap'>
        <table>
          <thead><tr><th>Title</th><th>Category</th><th>Created</th><th>Actions</th></tr></thead>
          <tbody id='knowledgeList'></tbody>
        </table>
      </div>
    </section>

    <section class='card' style='margin-top:16px'>
      <div class='card-head'><h3 id='knowledgeFormTitle' class='section-title'>Create Article</h3></div>
      <div class='form-grid'>
        <div class='form-group'><label>Title</label><input id='articleTitle'></div>
        <div class='form-group'><label>Category</label><input id='articleCategory' placeholder='General'></div>
        <div class='form-group' style='grid-column:1/-1'><label>Content</label><textarea id='articleContent' placeholder='Write article content'></textarea></div>
      </div>
      <div class='inline-actions' style='margin-top:12px'>
        <button id='knowledgeSaveBtn' class='btn btn-primary' onclick='saveArticle()'>Publish Article</button>
        <button id='knowledgeCancelBtn' class='btn btn-ghost hidden' type='button' onclick='resetKnowledgeForm()'>Cancel Edit</button>
      </div>
    </section>
  </main>
</div>
<script src='/modules/sidebar/js/admin-shell.js'></script><script src='/modules/common/js/app.js'></script><script src='/modules/common/js/table-skeleton.js'></script><script src='/knowledge/js/knowledge.js'></script>
</body></html>
