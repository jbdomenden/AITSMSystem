<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>Login | AITSM</title>
  <link rel='stylesheet' href='/css/styles.css'>
</head>
<body class='auth-shell auth-dark'>
  <section class='auth-panel'>
    <h2 class='auth-title'>AITSM Portal</h2>
    <p class='auth-subtitle'>Sign in to continue.</p>
    <div class='form-grid' style='grid-template-columns:1fr'>
      <div class='form-group'>
        <label>Email</label>
        <input id='email' type='email' placeholder='you@company.com'>
      </div>
      <div class='form-group'>
        <label>Password</label>
        <input id='password' type='password' placeholder='••••••••'>
      </div>
    </div>
    <label class='remember-row'><input type='checkbox'> Remember me</label>
    <button class='btn btn-primary auth-login-btn' onclick='login()'>Login</button>
    <p class='small auth-links'>Need an account? <a href='/signup.html' class='text-primary'>Only end users can sign up</a>.</p>
  </section>
  <script src='/js/app.js'></script>
  <script src='/js/auth.js'></script>
</body>
</html>
