<!doctype html>
<html>
<head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>User Management | AITSM</title><link rel='stylesheet' href='/css/styles.css'></head>
<body>
<div class='app-layout'>
  <aside id='adminSidebar' class='sidebar'></aside>
  <main class='content'>
    <section id='utilityHeader' class='utility-bar card'></section>

    <div class='topbar'>
      <div>
        <h1 class='page-title'>User Management</h1>
        <p class='page-subtitle'>Manage roles, reset passwords, and delete user accounts from one dedicated page.</p>
      </div>
    </div>

    <section class='card'>
      <div class='card-head'>
        <div>
          <h3 class='section-title'>Users</h3>
          <p class='section-subtitle'>All actions are connected to backend user lifecycle APIs.</p>
        </div>
      </div>
      <div class='table-wrap'>
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Email Verified</th><th>Actions</th></tr></thead>
          <tbody id='userMgmtRows'></tbody>
        </table>
      </div>
    </section>
  </main>
</div>
<script src='/js/admin-shell.js'></script><script src='/js/app.js'></script><script src='/js/user-management.js'></script>
</body></html>
