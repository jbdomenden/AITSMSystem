<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>AI Assistant | AITSM</title>
  <link rel='stylesheet' href='/frontend/css/styles.css'>
</head>
<body>
<div class='app-layout'>
  <aside id='userSidebar' class='sidebar'></aside>
  <main class='content'>
    <section id='utilityHeader' class='utility-bar card'></section>

    <div class='topbar'>
      <div>
        <p class='page-kicker'>AI support</p>
        <h1 class='page-title'>AI Troubleshooting Assistant</h1>
        <p class='page-subtitle'>Describe your issue and get guided troubleshooting help before creating a ticket.</p>
      </div>
      <div class='page-actions'>
        <button id='clearAiChatBtn' class='btn btn-ghost' type='button'>Clear chat</button>
        <button id='createTicketFromLastBtn' class='btn btn-ghost' type='button'>Create Ticket from Last Reply</button>
      </div>
    </div>

    <section class='ai-assistant-layout'>
      <div class='card ai-chat-card'>
        <div id='aiThread' class='ai-chat-thread'></div>
        <div id='aiLoading' class='ai-loading hidden'>AI assistant is preparing troubleshooting guidance...</div>
        <div id='aiFallbackPanel' class='card hidden' style='margin:12px 0'>
          <div id='aiFallbackMessage' class='small'></div>
          <div id='aiFallbackDetails'></div>
          <div class='inline-actions'>
            <button id='aiFallbackTicketBtn' type='button' class='btn btn-ghost'>Create ticket draft from this reply</button>
          </div>
        </div>
        <form id='aiComposer' class='ai-composer'>
          <label for='aiMessage' class='small'>Describe your issue</label>
          <textarea id='aiMessage' maxlength='2000' placeholder='Example: My laptop is slow after startup and Outlook keeps freezing.'></textarea>
          <div class='inline-actions' style='justify-content:space-between'>
            <span class='small'>Enter to send, Shift+Enter for new line.</span>
            <button id='aiSendBtn' class='btn btn-primary' type='submit'>Send</button>
          </div>
        </form>
      </div>

      <aside class='card ai-suggestions-card'>
        <div class='card-head'>
          <div>
            <h3 class='section-title'>Suggested prompts</h3>
            <p class='section-subtitle'>Quick starters for common IT issues.</p>
          </div>
        </div>
        <div class='ai-prompt-list'>
          <button class='btn btn-ghost ai-prompt' type='button' data-prompt='My laptop is slow'>My laptop is slow</button>
          <button class='btn btn-ghost ai-prompt' type='button' data-prompt='Printer is not detected'>Printer is not detected</button>
          <button class='btn btn-ghost ai-prompt' type='button' data-prompt='I cannot connect to Wi-Fi'>I cannot connect to Wi-Fi</button>
          <button class='btn btn-ghost ai-prompt' type='button' data-prompt='My account is locked'>My account is locked</button>
          <button class='btn btn-ghost ai-prompt' type='button' data-prompt='Blue screen error after startup'>Blue screen error after startup</button>
        </div>
      </aside>
    </section>
  </main>
</div>
<script src='/frontend/js/user-shell.js'></script>
<script src='/frontend/js/app.js'></script>
<script src='/frontend/js/ai-assistant.js'></script>
</body>
</html>
