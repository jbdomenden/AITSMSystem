<!doctype html>
<html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Admin Dashboard | AITSM</title><link rel='stylesheet' href='/css/styles.css'></head>
<body>
<div class='app-layout'>
  <aside class='sidebar'>
    <div class='brand'>AITSM Admin</div>
    <nav class='nav-group'>
      <a class='nav-item' data-page='dashboard-admin.html' href='/dashboard-admin.html'>Dashboard</a>
      <a class='nav-item' data-page='tickets.html' href='/tickets.html'>Tickets</a>
      <a class='nav-item' data-page='monitoring.html' href='/monitoring.html'>Monitoring</a>
      <a class='nav-item' data-page='assets.html' href='/assets.html'>Assets</a>
      <a class='nav-item' data-page='knowledge.html' href='/knowledge.html'>Knowledge Base</a>
      <a class='nav-item' data-page='settings.html' href='/settings.html'>Settings</a>
    </nav>
  </aside>
  <main class='content'>
    <div class='topbar'>
      <div><h1 class='page-title'>Dashboard</h1><p class='page-subtitle'>Modern AI-powered IT service overview.</p></div>
      <div class='inline-actions'><a class='btn btn-primary' href='/create-ticket.html'>+ New Ticket</a><button class='btn btn-ghost' onclick='logout()'>Logout</button></div>
    </div>
    <section id='summaryCards' class='grid stats'></section>
    <section class='grid' style='margin-top:18px;grid-template-columns:1fr 1fr'>
      <article class='card'><h3>Ticket Trend</h3><p class='small'>Open vs resolved pattern and AI insights</p><pre id='ticketTrend' class='chart-placeholder' style='margin:0;white-space:pre-wrap'></pre></article>
      <article class='card'><h3>System Health</h3><p class='small'>CPU analytics and health score</p><pre id='systemHealth' class='chart-placeholder' style='margin:0;white-space:pre-wrap'></pre></article>
    </section>
  </main>
</div>
<script src='/js/app.js'></script><script src='/js/dashboard.js'></script>
</body></html>
