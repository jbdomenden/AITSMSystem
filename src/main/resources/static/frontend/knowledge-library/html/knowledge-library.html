<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>Knowledge Base | AITSM</title>
  <link rel='stylesheet' href='/shared/css/styles.css'>
</head>
<body>
<div class='app-layout'>
  <aside id='userSidebar' class='sidebar'></aside>
  <main class='content'>
    <section id='utilityHeader' class='utility-bar card'></section>

    <div class='topbar'>
      <div>
        <p class='page-kicker'>Troubleshooting library</p>
        <h1 class='page-title'>Knowledge Base</h1>
        <p class='page-subtitle'>Browse basic troubleshooting guides before creating a ticket.</p>
      </div>
    </div>

    <section class='card'>
      <div class='form-grid'>
        <div class='form-group'>
          <label>Search articles</label>
          <input id='search' placeholder='Search troubleshooting articles...' oninput='loadKnowledgeLibrary()'>
        </div>
        <div class='form-group'>
          <label>Category filter</label>
          <select id='knowledgeCategory' onchange='loadKnowledgeLibrary()'>
            <option value=''>All Categories</option>
            <option>Hardware</option>
            <option>Software</option>
            <option>Network</option>
            <option>Security</option>
            <option>Database</option>
            <option>General</option>
          </select>
        </div>
      </div>
    </section>

    <section class='card' style='margin-top:16px'>
      <div class='card-head'>
        <div>
          <h3 class='section-title'>Article Library</h3>
          <p class='section-subtitle'>Read-only troubleshooting references for end users.</p>
        </div>
      </div>
      <div class='table-wrap'>
        <table>
          <thead><tr><th>Title</th><th>Category</th><th>Created</th><th>Actions</th></tr></thead>
          <tbody id='knowledgeList'></tbody>
        </table>
      </div>
    </section>
  </main>
</div>
<script src='/modules/sidebar/js/user-shell.js'></script>
<script src='/modules/common/js/app.js'></script>
<script src='/knowledge-library/js/knowledge-library.js'></script>
</body>
</html>
