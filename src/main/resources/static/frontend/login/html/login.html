<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>Login | AITSM</title>
  <link rel='stylesheet' href='/shared/css/styles.css'>
</head>
<body class='auth-shell auth-dark'>
  <section class='auth-panel'>
    <h2 class='auth-title'>AITSM Portal</h2>
    <p class='auth-subtitle'>Sign in to continue.</p>
    <div class='form-grid' style='grid-template-columns:1fr'>
      <div class='form-group'>
        <label>Email</label>
        <input id='email' type='email' placeholder='you@company.com'>
      </div>
      <div class='form-group'>
        <label>Password</label>
        <div class='password-field'>
          <input id='password' type='password' placeholder='••••••••'>
          <button id='loginPasswordToggle' class='password-toggle-btn' type='button' aria-label='Show password' aria-pressed='false' title='Show password'>
            <span class='password-toggle-icon password-toggle-show' aria-hidden='true'>👁</span>
            <span class='password-toggle-icon password-toggle-hide hidden' aria-hidden='true'>🙈</span>
          </button>
        </div>
      </div>
    </div>
    <label class="remember-row">
      <input type="checkbox" id="rememberMe" />
      <span>Remember me</span>
    </label>
    <button class='btn btn-primary auth-login-btn' onclick='login()'>Login</button>
    <p class='small auth-links'>Need an account? <a href='/signup.html' class='text-primary'>sign up</a>.</p>
  </section>
  <script src='/modules/common/js/app.js'></script>
  <script src='/login/js/auth.js'></script>
</body>
</html>
